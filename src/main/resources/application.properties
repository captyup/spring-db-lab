spring.application.name=spring-db-lab

# Data Source (H2 MySQL Compatibility Mode)
spring.datasource.url=jdbc:h2:mem:spring_db_lab;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (Access via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.com.zaxxer.hikari=debug

# HikariCP Configuration (For Experiment 1)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.connection-timeout=2000
